<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#EFEFF4">
<title>Тренер</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
</head>
<body>
<div class="wrap">

  <!-- Экран: Сегодня (хаб) -->
  <section id="screen-today">
    <div class="card big">
      <h1 id="today-title"></h1>
      <div class="s" id="today-week"></div>
    </div>

    <button type="button" class="card accent card-btn" id="resume-tile" hidden></button>
    <button type="button" class="card card-btn" id="backup-tile" hidden></button>

    <button type="button" class="card card-btn" id="hub-workout-tile">
      <div class="history-title">🏋️ Тренировка</div>
      <div class="history-sub" id="hub-workout-sub"></div>
    </button>

    <button type="button" class="card card-btn" id="food-tile">Еда 🍽</button>

    <button type="button" class="card card-btn" id="hub-weights-tile">
      <div class="history-title">⚖️ Взвешивание</div>
      <div class="history-sub" id="hub-weights-sub"></div>
    </button>

    <button type="button" class="card card-btn" id="hub-history-tile">
      <div class="history-title">🕓 История</div>
    </button>

    <div class="error" id="today-error" hidden></div>
  </section>

  <!-- Экран: Тренировка -->
  <section id="screen-workout" hidden>
    <div class="card big">
      <h1 id="workout-title"></h1>
      <div class="s" id="workout-week"></div>
    </div>

    <button type="button" class="card accent card-btn" id="workout-resume-tile" hidden></button>
    <button type="button" class="card accent card-btn" id="workout-measure-tile" hidden>Замеры 📏 — рабочие максимумы месяца</button>

    <button type="button" class="card mini card-btn" id="workout-pullup-tile">
      <div class="l">Максимум подтягиваний</div>
      <div class="v" id="workout-pullup-value"></div>
    </button>
    <div class="error" id="workout-error" hidden></div>

    <div class="grid grid2">
      <button type="button" class="btn" id="btn-day-a">Силовая A</button>
      <button type="button" class="btn" id="btn-day-b">Силовая B</button>
      <button type="button" class="btn" id="btn-day-c">Силовая C</button>
      <button type="button" class="btn" id="btn-run">Бег 🏃</button>
    </div>
  </section>

  <!-- Экран: История -->
  <section id="screen-history" hidden>
    <div class="hd"><span class="step">История</span></div>

    <div class="card flash" id="history-flash" hidden></div>

    <!-- Кнопки над списком: копии историй копятся, листать вниз за кнопками неудобно (заказ CEO 08.07). -->
    <div class="grid grid2">
      <button type="button" class="btn" id="history-export">Сохранить копию 📤</button>
      <button type="button" class="btn" id="history-import">Восстановить из копии 📥</button>
    </div>
    <input type="file" id="history-file-input" accept="application/json,.json" hidden>
    <div class="error" id="history-error" hidden></div>

    <button type="button" class="btn btn-wide" id="btn-history-back">← Сегодня</button>

    <div id="history-list"></div>
  </section>

  <!-- Экран: Сессия -->
  <section id="screen-session" hidden>
    <div class="hd"><span class="step" id="session-step"></span><span class="pill" id="session-pill"></span></div>

    <div class="card flash" id="session-flash" hidden></div>

    <div class="card technique" id="session-technique" hidden>
      <img id="session-technique-img" alt="">
    </div>

    <div class="card big">
      <h1 id="session-exercise"></h1>
      <div class="s" id="session-scheme"></div>
      <div class="note" id="session-note" hidden></div>
    </div>

    <div class="card mini" id="session-last">
      <div class="l">Прошлый раз</div>
      <div class="v" id="session-last-value"></div>
    </div>

    <button type="button" class="card mini card-btn" id="session-pullup-max" hidden>
      <div class="l">Максимум подтягиваний</div>
      <div class="v" id="session-pullup-max-value"></div>
    </button>

    <div class="card mini" id="session-recorded" hidden>
      <div class="l">Записано</div>
      <div class="v" id="session-recorded-value"></div>
    </div>

    <div class="input-row" id="session-input-row">
      <input type="text" inputmode="text" id="session-input" placeholder="напр. 50-5,5,5 или 50-5 52-5">
      <button type="button" class="btn btn-accent" id="session-submit">Записать</button>
    </div>
    <div class="error" id="session-error" hidden></div>

    <button type="button" class="card card-btn timer" id="session-timer" hidden>
      <div class="l">Отдых</div>
      <div class="timer-digits" id="session-timer-value"></div>
    </button>
    <div class="grid grid3">
      <button type="button" class="btn" id="btn-rest-1">Отдых 1:00</button>
      <button type="button" class="btn" id="btn-rest-2">Отдых 2:00</button>
      <button type="button" class="btn" id="btn-rest-3">Отдых 3:00</button>
    </div>

    <!-- Кнопка «Больно 🚑» убрана по решению CEO 10.07.2026 (не актуальна).
         painFlag в модели данных и рендер старых записей «🚑 больно» в истории сохранены. -->
    <div class="grid grid2" id="session-actions">
      <button type="button" class="btn btn-accent" id="session-same">Так же ✅</button>
      <button type="button" class="btn" id="session-skip">Пропуск ⏭</button>
    </div>

    <div class="grid grid2">
      <button type="button" class="btn" id="session-back">← назад</button>
      <button type="button" class="btn" id="session-forward">вперёд →</button>
    </div>
  </section>

  <!-- Экран: Самочувствие -->
  <section id="screen-wellbeing" hidden>
    <div class="card big">
      <h1>Сессия закрыта</h1>
      <div class="s">Самочувствие?</div>
    </div>

    <div class="card flash" id="wellbeing-flash" hidden></div>

    <div class="input-row">
      <input type="text" id="wellbeing-note" placeholder="Заметка (необязательно)">
    </div>
    <div class="grid grid5" id="wellbeing-grid"></div>
    <button type="button" class="btn btn-wide" id="wellbeing-skip">Пропустить</button>
  </section>

  <!-- Экран: сессия зафиксирована (плюс предупреждение о перетрене, если есть) -->
  <section id="screen-done" hidden>
    <div class="card big"><h1>Отдыхай 💪</h1></div>
    <div class="card flash" id="done-alert" hidden></div>
    <button type="button" class="btn btn-wide" id="done-back">← Сегодня</button>
  </section>

  <!-- Экран: Бег -->
  <section id="screen-run" hidden>
    <div class="card big"><h1>Пробежка записана 🏃</h1></div>
    <div class="input-row">
      <input type="text" id="run-input" placeholder="напр. 5 км, 30 мин">
    </div>
    <button type="button" class="btn btn-wide btn-accent" id="run-done">Готово</button>
  </section>

  <!-- Экран: Еда (дневник калорий; дизайн_питание_фото_еды.md) -->
  <section id="screen-food" hidden>
    <div class="hd"><span class="step">Еда</span></div>

    <div class="card flash" id="food-flash" hidden></div>

    <div class="card big">
      <h1 id="food-totals-kcal"></h1>
      <div class="bar"><div class="bar-fill" id="food-bar-kcal"></div></div>
      <div class="s" id="food-totals-protein"></div>
      <div class="bar"><div class="bar-fill accent" id="food-bar-protein"></div></div>
    </div>

    <button type="button" class="card accent card-btn" id="food-pending-tile" hidden></button>

    <div class="card mini" id="food-busy" hidden><div class="v">Распознаю… ⏳</div></div>

    <div class="card" id="food-draft" hidden>
      <div class="l">Проверь и запиши</div>
      <div class="input-row">
        <input type="text" id="food-draft-name" placeholder="название блюда">
      </div>
      <div class="input-row">
        <input type="number" inputmode="numeric" id="food-draft-kcal" placeholder="ккал">
        <input type="number" inputmode="numeric" id="food-draft-protein" placeholder="белок, г">
      </div>
      <div class="grid grid3" id="food-portion-row">
        <button type="button" class="btn" id="food-portion-half">½ порции</button>
        <button type="button" class="btn" id="food-portion-one">1</button>
        <button type="button" class="btn" id="food-portion-big">1½</button>
      </div>
      <div class="grid grid2">
        <button type="button" class="btn btn-accent" id="food-draft-save">Записать</button>
        <button type="button" class="btn" id="food-draft-cancel">Отмена</button>
      </div>
      <button type="button" class="btn btn-wide btn-danger" id="food-draft-delete" hidden>Удалить запись</button>
    </div>

    <div id="food-list"></div>

    <div class="grid grid2">
      <button type="button" class="btn btn-accent" id="food-photo-btn">📷 Фото</button>
      <button type="button" class="btn" id="food-text-btn">✍️ Текстом</button>
    </div>
    <input type="file" id="food-file-input" accept="image/*" hidden>

    <div class="input-row" id="food-text-row" hidden>
      <input type="text" id="food-text-input" placeholder="напр. 2 яйца и творог 200 г">
      <button type="button" class="btn btn-accent" id="food-text-submit">Оценить</button>
    </div>

    <div class="error" id="food-error" hidden></div>

    <div class="card" id="food-settings" hidden>
      <div class="l">Настройки еды</div>
      <input type="password" id="food-key-input" placeholder="Ключ API (sk-ant-…)">
      <div class="input-row">
        <input type="number" inputmode="numeric" id="food-goal-kcal" placeholder="цель, ккал">
        <input type="number" inputmode="numeric" id="food-goal-protein" placeholder="цель белка, г">
      </div>
      <button type="button" class="btn btn-wide" id="food-settings-save">Сохранить настройки</button>
    </div>
    <button type="button" class="btn btn-wide" id="food-settings-btn">⚙️ Настройки еды</button>

    <button type="button" class="btn btn-wide" id="food-back">← Сегодня</button>
  </section>

  <!-- Экран: Взвешивание (дизайн_v7_хаб_и_взвешивание.md, раздел 2) -->
  <section id="screen-weights" hidden>
    <div class="hd"><span class="step">Взвешивание</span></div>

    <div class="card flash" id="weights-flash" hidden></div>

    <div class="card big">
      <h1 id="weights-latest-value"></h1>
      <div class="s" id="weights-latest-sub"></div>
    </div>

    <div class="card mini" id="weights-busy" hidden><div class="v">Распознаю… ⏳</div></div>

    <div class="card" id="weights-draft" hidden>
      <div class="l">Проверь и запиши</div>
      <div class="input-row">
        <input type="number" inputmode="decimal" id="weights-draft-weight" placeholder="вес, кг">
      </div>
      <div class="input-row">
        <input type="number" inputmode="decimal" id="weights-draft-fat" placeholder="жир, %">
        <input type="number" inputmode="decimal" id="weights-draft-muscle" placeholder="мышцы, кг">
      </div>
      <div class="grid grid2">
        <button type="button" class="btn btn-accent" id="weights-draft-save">Записать</button>
        <button type="button" class="btn" id="weights-draft-cancel">Отмена</button>
      </div>
      <button type="button" class="btn btn-wide btn-danger" id="weights-draft-delete" hidden>Удалить запись</button>
    </div>

    <div id="weights-list"></div>

    <div class="grid grid2">
      <button type="button" class="btn btn-accent" id="weights-screen-btn">📷 Скрин весов</button>
      <button type="button" class="btn" id="weights-manual-btn">✍️ Вручную</button>
    </div>
    <input type="file" id="weights-file-input" accept="image/*" hidden>

    <div class="error" id="weights-error" hidden></div>
  </section>

</div>
<nav id="tabbar">
  <button type="button" class="tab" id="tab-today"><span class="i">🏠</span>Сегодня</button>
  <button type="button" class="tab" id="tab-workout"><span class="i">🏋️</span>Тренировка</button>
  <button type="button" class="tab" id="tab-food"><span class="i">🍽</span>Еда</button>
  <button type="button" class="tab" id="tab-weights"><span class="i">⚖️</span>Вес</button>
</nav>
<div id="app-version" class="app-version" hidden></div>
<script type="module" src="ui/app.js"></script>
<script>
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
</body>
</html>
